services:
  redis:
    image: redis:7-alpine
    container_name: spidercrawl-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: spidercrawl-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: spidercrawl
      POSTGRES_PASSWORD: spidercrawl
      POSTGRES_DB: spidercrawl
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spidercrawl -d spidercrawl"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: spidercrawl-worker
    ports:
      - "8400:8400"
    environment:
      WORKER_HOST: 0.0.0.0
      WORKER_PORT: 8400
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8400/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spidercrawl-api
    ports:
      - "3200:3200"
    env_file:
      - .env
    environment:
      PORT: 3200
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_HOST: worker
      WORKER_PORT: 8400
      DATABASE_URL: postgresql://spidercrawl:spidercrawl@postgres:5432/spidercrawl
      REQUIRE_API_KEY: "false" # Default to false for easy local testing
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      worker:
        condition: service_healthy

volumes:
  redis-data:
  postgres-data:
